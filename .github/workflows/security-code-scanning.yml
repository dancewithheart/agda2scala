name: Security code scanning

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: security-code-scanning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  haskell-security:
    name: Haskell security scan
    runs-on: ubuntu-latest
    timeout-minutes: 42
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.1'
          cabal-version: '3.12.1.0'
          cabal-update: true

      - name: Run Haskell Security Action
        # uses: blackheaven/haskell-security-action@master
        uses: dancewithheart/haskell-security-action@fix-warnings
  
