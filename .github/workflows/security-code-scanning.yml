name: Security code scanning

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: security-code-scanning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  haskell-security:
    name: Haskell security scan
    runs-on: ubuntu-latest
    timeout-minutes: 42
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up GHC
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2
        with:
          ghc-version: '9.10.1'
          cabal-version: '3.12.1.0'
          cabal-update: true

      - name: Run Haskell Security Action
        uses: blackheaven/haskell-security-action@5b175efa1845a44cb6404a8dfd9a9cc65fcdb2ac # master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  
